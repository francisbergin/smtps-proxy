on: [push, pull_request]
name: Test
jobs:
  test:
    name: Go tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Install dependencies
        run: go get .
      - name: Run tests
        run: go test -v ./...
